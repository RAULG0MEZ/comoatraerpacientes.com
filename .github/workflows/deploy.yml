name: Desplegar a GitHub Pages

# Publica el sitio estático en GitHub Pages usando GitHub Actions.
# Requiere: Settings → Pages → "Build and deployment" → Source: "GitHub Actions".

on:
  # Despliega al hacer push/merge a main
  push:
    branches: [main]
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos mínimos que necesita el despliegue a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela el que ya está en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir el sitio como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          # Sitio 100% estático servido desde la raíz del repositorio
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
